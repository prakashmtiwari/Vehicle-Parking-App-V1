# ==============================================================
# Vehicle Parking APP - DevSecOps CI/CD Pipeline
# ==============================================================


name: CI/CD Pipeline for Vehicle Parking APP

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
    contents: read
    pull-requests: write


env:
    DOCKER_REGISTRY: ghcr.io
    BACKEND_IMAGE: ghcr.io/${{ github.repository }}/vpa


jobs:
  build:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t $BACKEND_IMAGE:${{ github.sha }} .

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: $DOCKER_REGISTRY
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .        # path to your Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max